    const handleFileUpload = (event, setEmployees, showNotification) => {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const sheetName = workbook.SheetNames[0];
          const worksheet = workbook.Sheets[sheetName];
          const json = XLSX.utils.sheet_to_json(worksheet, { defval: "" }); // defval ensures empty cells are defined strings

          if (json.length === 0) {
            showNotification('warning', 'Archivo Vacío', 'El archivo no contiene datos legibles.');
            return;
          }

          // Helper to find value by fuzzy key
          const findValue = (row, keywords) => {
            const keys = Object.keys(row);
            for (const key of keys) {
              const lowerKey = key.toLowerCase();
              if (keywords.some(k => lowerKey.includes(k))) {
                return row[key];
              }
            }
            return null;
          };

          setEmployees(prevEmployees => {
            const startId = prevEmployees.length > 0 ? prevEmployees.reduce((mx,e) => e.id>mx?e.id:mx, 0) + 1 : 1;

            const newEmployees = json.map((row, index) => {
              // Try to find Name by keyword, else use first column, else default
              let name = findValue(row, ['nomb', 'name', 'pers', 'trabaj', 'emple']);
              if (!name) {
                const values = Object.values(row);
                if (values.length > 0) name = values[0]; // Fallback to first column
              }
              name = name || `Empleado Importado ${index + 1}`;

              // Try to find Dept
              let department = findValue(row, ['depar', 'area', 'sec', 'carg', 'puesto']);
              department = department || 'General';

              // Gender logic
              let gender = 'male';
              let genderVal = findValue(row, ['gen', 'sex']);
              if (genderVal) {
                const g = String(genderVal).toLowerCase().trim();
                if (['f', 'mujer', 'femenino', 'female', 'woman'].some(term => g.startsWith(term))) {
                  gender = 'female';
                }
              }

              return {
                id: startId + index,
                name: String(name).toUpperCase(),
                department: String(department).toUpperCase(),
                gender: gender
              };
            });

            // Filter out potentially empty rows that just have IDs
            const validNewEmployees = newEmployees.filter(e => e.name !== '' && !e.name.startsWith('Empleado Importado') || e.name.length > 3);
            // Actually, keep them but ensuring valid names is tough.
            // Let's trust the map for now but maybe filter really empty ones?
            // User complained about "Empleado Nuevo" so the fallback was triggering.

            return [...prevEmployees, ...newEmployees];
          });

          showNotification('success', 'Éxito', `${json.length} empleados procesados. Verifica los datos.`);
        } catch (error) {
          console.error("Error reading Excel file:", error);
          showNotification('warning', 'Error de Importación', 'Ocurrió un error al leer el archivo.');
        }
      };
      reader.readAsArrayBuffer(file);
      event.target.value = '';
    };

    const Reports = ({ inspections, employees, formatInfo }) => {
      const [reportDate, setReportDate] = React.useState(new Date().toISOString().split('T')[0]);

      const reportData = React.useMemo(() => {
        return inspections.filter(i => i.date === reportDate);
      }, [inspections, reportDate]);

      const exportToPdf = () => {
        if (reportData.length === 0) {
          alert('No hay datos para generar el reporte en la fecha seleccionada.');
          return;
        }

        // Logo definido globalmente al inicio del script

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape');
        const pageWidth = doc.internal.pageSize.getWidth();
        const pageHeight = doc.internal.pageSize.getHeight();

        const head = [[
          { content: 'Nombre del Personal', styles: { halign: 'left', minCellWidth: 35 } },
          { content: 'Estado de Salud', styles: { minCellWidth: 17 } },
          { content: 'Sin Heridas o Cortes', styles: { minCellWidth: 17 } },
          { content: 'Uniforme Completo y Limpio', styles: { minCellWidth: 17 } },
          { content: 'Calzado Adecuado y Limpio', styles: { minCellWidth: 17 } },
          { content: 'Uñas Cortas y Limpias', styles: { minCellWidth: 17 } },
          { content: 'Cabello Corto y Recogido', styles: { minCellWidth: 17 } },
          { content: 'Afeitado', styles: { minCellWidth: 17 } },
          { content: 'Sin Objetos / Maquillaje', styles: { minCellWidth: 17 } },

          { content: 'Observaciones', styles: { halign: 'left' } },
          { content: 'Acciones Correctivas', styles: { halign: 'left' } }
        ]];

        const formatStatusToString = (status) => {
          if (status === 'conforme') return '✓';
          if (status === 'no-conforme') return 'X';
          return '--';
        };

        const getObjectsMakeupStatusString = (inspection) => {
          if (inspection.noObjects === 'conforme' && (inspection.noMakeup === 'conforme' || inspection.noMakeup === 'no-aplica')) {
            return '✓';
          }
          if (inspection.noObjects === 'no-conforme' || inspection.noMakeup === 'no-conforme') {
            return 'X';
          }
          return '--';
        };

        const body = reportData.map(inspection => {
          const employee = employees.find(e => e.id === inspection.employeeId);
          return [
            employee?.name || `Empleado ID: ${inspection.employeeId}`,
            formatStatusToString(inspection.healthStatus),
            formatStatusToString(inspection.wounds),
            formatStatusToString(inspection.uniform),
            formatStatusToString(inspection.footwear),
            formatStatusToString(inspection.nails),
            formatStatusToString(inspection.hair),
            formatStatusToString(inspection.shaved),
            getObjectsMakeupStatusString(inspection),
            formatStatusToString(inspection.handWash),
            inspection.observations || '-',
            inspection.correctiveActions || '-'
          ];
        });

        const addPageHeaders = () => {
          // Add logo if available
          if (logoBase64) {
            try {
              doc.addImage(logoBase64, 15, 5, 25, 18);
            } catch (e) {
              console.log('Error adding logo to PDF:', e);
            }
          }

          doc.setFontSize(14);
          doc.text('CONTROL DE ESTADO DE SALUD, HIGIENE E INDUMENTARIA DEL PERSONAL', pageWidth / 2, 15, { align: 'center' });
          doc.setFontSize(10);
          doc.text(`Fecha: ${new Date(reportDate + 'T00:00:00').toLocaleDateString()}`, pageWidth / 2, 22, { align: 'center' });

          doc.autoTable({
            body: [
              [
                { content: 'Código', styles: { fontStyle: 'bold', fillColor: '#f8f9fa' } }
              ],
              [formatInfo.code]
            ],
            startY: 26,
            theme: 'grid',
            styles: { fontSize: 8, halign: 'center', cellPadding: 1.5 },
            margin: { left: 15, right: 15 }
          });

          return doc.lastAutoTable.finalY + 5;
        }

        const addPageFooters = (data) => {
          const pageCount = doc.internal.getNumberOfPages();
          const footerY = pageHeight - 20;

          doc.setPage(data.pageNumber);

          doc.setFontSize(9);
          doc.setTextColor(0);
          doc.text('_________________________', pageWidth / 2, footerY - 5, { align: 'center' });
          doc.text('Jefe de Planta', pageWidth / 2, footerY, { align: 'center' });

          doc.setFontSize(8);
          doc.setTextColor(100);

          doc.text('Leyenda:', 15, footerY);
          doc.setTextColor(34, 197, 94); // green
          doc.text('✓ Conforme', 35, footerY);
          doc.setTextColor(239, 68, 68); // red
          doc.text('X No Conforme', 65, footerY);
          doc.setTextColor(100); // gray
          doc.text('-- No Aplica', 100, footerY);

          doc.setTextColor(100);
          doc.text(`Página ${data.pageNumber} de ${pageCount}`, pageWidth - 30, pageHeight - 10);
        }

        doc.autoTable({
          head: head,
          body: body,
          startY: addPageHeaders(),
          theme: 'grid',
          headStyles: { fillColor: [44, 110, 73], textColor: 255, fontStyle: 'bold', halign: 'center', valign: 'middle', fontSize: 7, cellPadding: 1 },
          styles: { fontSize: 8, cellPadding: 1.5, halign: 'center', valign: 'middle' },
          columnStyles: {
            0: { halign: 'left', fontSize: 8 },
            10: { halign: 'left', cellWidth: 35, fontSize: 8 },
            11: { halign: 'left', cellWidth: 35, fontSize: 8 }
          },
          didParseCell: function (data) {
            if (data.cell.section === 'body') {
              if (data.cell.raw === '✓') {
                data.cell.styles.font = 'ZapfDingbats';
                data.cell.styles.textColor = [34, 197, 94];
                data.cell.text = ['4'];
              }
              if (data.cell.raw === 'X') {
                data.cell.styles.font = 'ZapfDingbats';
                data.cell.styles.textColor = [239, 68, 68];
                data.cell.text = ['5'];
              }
            }
          },
          didDrawPage: addPageFooters,
          margin: { top: 10, bottom: 25, left: 15, right: 15 }
        });

        doc.save(`reporte_higiene_${reportDate}.pdf`);
      };

      const formatStatus = (status) => {
        if (status === 'conforme') return <span className="font-bold text-green-600 text-xl">✓</span>;
        if (status === 'no-conforme') return <span className="font-bold text-red-600 text-xl">X</span>;
        if (status === 'no-aplica') return <span className="text-gray-500 font-bold text-lg">--</span>;
        return <span className="text-gray-400">--</span>;
      };

      const getObjectsMakeupStatus = (inspection) => {
        if (inspection.noObjects === 'conforme' && (inspection.noMakeup === 'conforme' || inspection.noMakeup === 'no-aplica')) {
          return formatStatus('conforme');
        }
        if (inspection.noObjects === 'no-conforme' || inspection.noMakeup === 'no-conforme') {
          return formatStatus('no-conforme');
        }
        return formatStatus(null);
      };

      return (
        <div className="bg-white p-5 rounded-lg shadow-sm">
          <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div className="flex items-center gap-4">

                <PdfIcon className="w-4 h-4" />
                <span>Exportar a PDF</span>
              </button>
            </div>
          </div>

          <div className="p-4 bg-white">
            {reportData.length > 0 ? (
              <div className="overflow-x-auto">
                <table className="min-w-full border-collapse text-sm text-center">
                  <thead className="bg-[#2c6e49] text-white">
                    <tr>
                      <th className="p-2 border border-gray-300">Personal</th>
                      <th className="p-2 border border-gray-300">Salud</th>

                      <th className="p-2 border border-gray-300">Cabello</th>
                      <th className="p-2 border border-gray-300">Afeitado</th>
                      <th className="p-2 border border-gray-300">Objetos/Maquillaje</th>
                      <th className="p-2 border border-gray-300">Manos</th>
                      <th className="p-2 border border-gray-300 min-w-[150px] text-left">Observaciones</th>
                      <th className="p-2 border border-gray-300 min-w-[150px] text-left">Acciones Correctivas</th>
                    </tr>
                  </thead>
                  <tbody>
                    {reportData.map(inspection => {
                      const employee = employees.find(e => e.id === inspection.employeeId);
                      return (
                        <tr key={inspection.id} className="even:bg-gray-50">
                          <td className="p-2 border border-gray-300 text-left font-medium text-gray-900">{employee?.name}</td>
                          <td className="p-2 border border-gray-300">{formatStatus(inspection.healthStatus)}</td>
                          <td className="p-2 border border-gray-300">{formatStatus(inspection.wounds)}</td>
                          <td className="p-2 border border-gray-300">{formatStatus(inspection.uniform)}</td>
                          <td className="p-2 border border-gray-300">{formatStatus(inspection.footwear)}</td>
                          <td className="p-2 border border-gray-300">{formatStatus(inspection.nails)}</td>
                          <td className="p-2 border border-gray-300">{formatStatus(inspection.hair)}</td>
                          <td className="p-2 border border-gray-300">{formatStatus(inspection.shaved)}</td>
                          <td className="p-2 border border-gray-300">{getObjectsMakeupStatus(inspection)}</td>
                          <td className="p-2 border border-gray-300">{formatStatus(inspection.handWash)}</td>
                          <td className="p-2 border border-gray-300 text-left text-gray-700">{inspection.observations || '-'}</td>

                        </tr>

            )}
          </div>
        </div>
      );

    const Admin = ({ employees, onAddEmployee, onEditEmployee, onDeleteEmployee, onResetData, onSimulateInspections, onImportExcel, onExportJSON, onImportJSON }) => {

    const InspectionModal = ({ isOpen, onClose, onSubmit, employees, editingInspection }) => {
      const initialFormState = {
        healthStatus: null, wounds: null, uniform: null, footwear: null, nails: null,
        hair: null, shaved: null, noObjects: null, noMakeup: null, handWash: null,
      };

      const [date, setDate] = React.useState(new Date().toISOString().split('T')[0]);
      const [employeeId, setEmployeeId] = React.useState('');
      const [formData, setFormData] = React.useState(initialFormState);
      const [observations, setObservations] = React.useState('');
      const [correctiveActions, setCorrectiveActions] = React.useState('');

      const selectedEmployee = employees.find(e => e.id === parseInt(employeeId));

      React.useEffect(() => {
        if (isOpen) {
          if (editingInspection) {
            setDate(editingInspection.date);
            setEmployeeId(editingInspection.employeeId.toString());
            setFormData({
              healthStatus: editingInspection.healthStatus,
              wounds: editingInspection.wounds,
              uniform: editingInspection.uniform,
              footwear: editingInspection.footwear,
              nails: editingInspection.nails,
              hair: editingInspection.hair,
              shaved: editingInspection.shaved,
              noObjects: editingInspection.noObjects,
              noMakeup: editingInspection.noMakeup,
              handWash: editingInspection.handWash,
            });
            setObservations(editingInspection.observations || '');
            setCorrectiveActions(editingInspection.correctiveActions || '');
          } else {
            setDate(new Date().toISOString().split('T')[0]);
            setEmployeeId('');
            setFormData(initialFormState);
            setObservations('');
            setCorrectiveActions('');
          }
        }
      }, [isOpen, editingInspection]);

      const handleFormChange = (key, value) => {
        setFormData(prev => ({ ...prev, [key]: value }));
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!employeeId) {
          alert('Por favor, seleccione un empleado.');
          return;
        }

        const missingItem = INSPECTION_ITEMS.find(item => {
          if (!item.required) return false;
          const isVisible = !item.genderSpecific || (selectedEmployee && selectedEmployee.gender === item.genderSpecific);
          return isVisible && formData[item.id] === null;
        });

        if (missingItem) {
          alert(`Por favor, complete el campo requerido: ${missingItem.label}`);
          return;
        }

        onSubmit({
          id: editingInspection?.id,
          date, employeeId: parseInt(employeeId), ...formData, observations, correctiveActions,
        });
      };

      const renderRadioGroup = React.useCallback((item) => {
        const isVisible = !item.genderSpecific || (selectedEmployee && selectedEmployee.gender === item.genderSpecific);
        if (!isVisible) return null;

        return (
          <div className="mb-4" key={item.id}>
            <label className="block text-sm font-medium text-gray-700 mb-2">{item.label}</label>
            <div className="flex items-center gap-x-6">
              {item.options.map((option, index) => (
                <div key={option} className="flex items-center">
                  <input
                    type="radio"
                    id={`${item.id}-${option}`}
                    name={item.id}
                    value={option}
                    checked={formData[item.id] === option}
                    onChange={() => handleFormChange(item.id, option)}
                    required={item.required && index === 0}
                    className="h-4 w-4 border-gray-300 text-[#2c6e49] focus:ring-[#4c956c]"
                  />
                  <label htmlFor={`${item.id}-${option}`} className="ml-2 block text-sm text-gray-900 capitalize">{option.replace('-', ' ')}</label>
                </div>
              ))}
            </div>
          </div>
        );
      }, [formData, selectedEmployee]);

      return (
        <Modal
          isOpen={isOpen}
          onClose={onClose}
          title={editingInspection ? "Editar Inspección de Higiene" : "Nueva Inspección de Higiene"}
          footer={
            <>
              <button onClick={onClose} className="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium hover:bg-gray-50 transition-colors">Cancelar</button>
              <button type="submit" onClick={handleSubmit} className="px-4 py-2 bg-[#2c6e49] text-white rounded-md text-sm font-medium hover:bg-[#4c956c] transition-colors">{editingInspection ? 'Actualizar' : 'Guardar'} Inspección</button>
            </>
          }
        >
          <form onSubmit={handleSubmit} noValidate>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
              <div>
                <label htmlFor="inspectionDate" className="block text-sm font-medium text-gray-700 mb-1">Fecha</label>

              </div>
              <div>
                <label htmlFor="employeeSelect" className="block text-sm font-medium text-gray-700 mb-1">Empleado</label>
                <select id="employeeSelect" value={employeeId} onChange={e => setEmployeeId(e.target.value)} required className="w-full p-2 border border-gray-300 rounded-md focus:ring-[#2c6e49] focus:border-[#2c6e49] bg-white">
                  <option value="">Seleccionar empleado</option>
                  {employees.map(emp => <option key={emp.id} value={emp.id}>{emp.name}</option>)}
                </select>
              </div>
            </div>
            <hr className="my-4" />
            {INSPECTION_ITEMS.map(renderRadioGroup)}
            <hr className="my-4" />
            <div>
              <label htmlFor="observations" className="block text-sm font-medium text-gray-700 mb-1">Observaciones</label>
              <textarea id="observations" value={observations} onChange={e => setObservations(e.target.value)} rows={3} className="w-full p-2 border border-gray-300 rounded-md focus:ring-[#2c6e49] focus:border-[#2c6e49] bg-white"></textarea>
            </div>
            <div className="mt-4">
              <label htmlFor="correctiveActions" className="block text-sm font-medium text-gray-700 mb-1">Acciones Correctivas</label>
              <textarea id="correctiveActions" value={correctiveActions} onChange={e => setCorrectiveActions(e.target.value)} rows={3} className="w-full p-2 border border-gray-300 rounded-md focus:ring-[#2c6e49] focus:border-[#2c6e49] bg-white"></textarea>
            </div>
          </form>
        </Modal>
      );
    };

          isOpen={isOpen}
          onClose={onClose}
          title={editingEmployee ? "Editar Empleado" : "Agregar Nuevo Empleado"}
          footer={
            <>
              <button onClick={onClose} className="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium hover:bg-gray-50 transition-colors">Cancelar</button>
              <button onClick={handleSubmit} className="px-4 py-2 bg-[#2c6e49] text-white rounded-md text-sm font-medium hover:bg-[#4c956c] transition-colors">{editingEmployee ? 'Actualizar' : 'Guardar'} Empleado</button>
            </>
          }
        >
          <form onSubmit={handleSubmit} className="space-y-4">
            <div>
              <label htmlFor="employeeName" className="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
              <input type="text" id="employeeName" value={name} onChange={e => setName(e.target.value)} required className="w-full p-2 border border-gray-300 rounded-md focus:ring-[#2c6e49] focus:border-[#2c6e49] bg-white" />
            </div>
            <div>
              <label htmlFor="employeeDepartment" className="block text-sm font-medium text-gray-700 mb-1">Departamento</label>
              <input type="text" id="employeeDepartment" value={department} onChange={e => setDepartment(e.target.value)} required className="w-full p-2 border border-gray-300 rounded-md focus:ring-[#2c6e49] focus:border-[#2c6e49] bg-white" />
            </div>
            <div>
              <label htmlFor="employeeGender" className="block text-sm font-medium text-gray-700 mb-1">Género</label>
              <select id="employeeGender" value={gender} onChange={e => setGender(e.target.value)} required className="w-full p-2 border border-gray-300 rounded-md focus:ring-[#2c6e49] focus:border-[#2c6e49] bg-white">
                <option value="">Seleccionar</option>
                <option value="male">Masculino</option>
                <option value="female">Femenino</option>
              </select>
            </div>
          </form>
        </Modal>
      );
    };
    // ============================================================
    // MÓDULO DE INSPECCIÓN POR VOZ
    // - SR continuous:true, instancia única, permiso una sola vez
    // - SR se pausa mientras habla la app (evita eco)
    // - autoStart arranca sin tocar el micrófono
    // ============================================================

    const MicrophoneIcon = (props) => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" {...props}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />
      </svg>
    );
    const CheckBadgeIcon = (props) => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" {...props}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.745 3.745 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.745 3.745 0 013.296-1.043A3.745 3.745 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.745 3.745 0 013.296 1.043 3.745 3.745 0 011.043 3.296A3.745 3.745 0 0121 12z" />
      </svg>
    );
    const SpeakerWaveIcon = (props) => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" {...props}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z" />
      </svg>
    );

    // ── Helpers ─────────────────────────────────────────────────
    const norm = (t) => t.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[^a-z0-9\s]/g,'').trim();

    // v6: La app no habla, no hay eco — se pueden usar frases naturales
    const isAllOk = (t) => {
      const n = norm(t);
      // Rechazar si contiene palabras de observación
      if (['observacion','no conforme','con novedad','hay problema','con falla','con problema']
          .some(k => n.includes(k))) return false;
      return ['todo conforme','todos conformes','conforme','todo bien','todo ok',
              'sin observaciones','sin novedad','todo correcto','listo','aprobado','bien','ok']
        .some(k => n.includes(k));
    };

    const hasObs = (t) => {
      const n = norm(t);
      return ['con observacion','observaciones','observacion','no conforme',
              'con novedad','hay problema','con falla','con problema',
              'falla','problema','hay observ','con obs']
        .some(k => n.includes(k));
    };

    const extractNum = (t) => {
      const n = norm(t);
      // Extraer cualquier secuencia de dígitos (Android puede dar "7." o "007")
      const m = n.match(/(\d+)/);
      if (m) {
        const v = parseInt(m[1]);
        if (v >= 1 && v <= 99) return v;
      }
      // Palabras numéricas — orden de mayor a menor para evitar match parcial
      const W = [
        ['veinte',20],['diecinueve',19],['dieciocho',18],['diecisiete',17],['dieciseis',16],
        ['quince',15],['catorce',14],['trece',13],['doce',12],['once',11],['diez',10],
        ['nueve',9],['ocho',8],['siete',7],['seis',6],['cinco',5],
        ['cuatro',4],['tres',3],['dos',2],['uno',1],
      ];
      for (const [w,v] of W) if (n.includes(w)) return v;
      return null;
    };

    const ITEM_KW = {
      healthStatus:['salud','estado de salud','estado salud','enferm','fiebre','tos'],
      wounds:      ['herida','corte','lesion','lastim'],
      uniform:     ['uniforme','ropa','indumentaria','vestimenta','overol'],
      footwear:    ['calzado','zapato','bota','zapatilla'],
      nails:       ['una','unas','nail'],
      hair:        ['cabello','pelo','cabello'],
      shaved:      ['afeit','barba','rasurad'],
      noObjects:   ['objeto','joya','aretes','anillo','reloj','piercing','accesorio','cadena'],
      noMakeup:    ['maquillaje','pintura','labial','rimmel','cosmetico'],
      handWash:    ['mano','lavado','lavado de mano','manos'],
    };

    const detectItems = (text, visible) => {
      const n = norm(text);
      return visible.filter(item => (ITEM_KW[item.id]||[]).some(k => n.includes(k)));
    };

    const VS = {
      INIT:'init', IDLE:'idle', LISTENING:'listening',
      CONFIRM:'confirm', GENERAL:'general', ITEMS:'items',
      OBS:'obs', CORR:'corr', SAVING:'saving', DONE:'done'
    };

    // ════════════════════════════════════════════════════════════
    // v6: La app NO habla. speakAndListen simplificado —
    // cancela cualquier síntesis residual y llama onEnd directo.
    // ════════════════════════════════════════════════════════════
    const speakAndListen = (speakingRef, partialRef, text, onEnd, srRef, makeSR) => {
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      speakingRef.current = false;
      partialRef.current = '';
      if (onEnd) setTimeout(onEnd, 80);
    };

    // ════════════════════════════════════════════════════════════
    // useSpeechEngine — SIN getUserMedia (compatible con content://, file://, http://)
    // ════════════════════════════════════════════════════════════
    // En Android, cuando el archivo se abre desde WhatsApp/Drive (content://),
    // getUserMedia SIEMPRE falla aunque Chrome tenga permiso. SpeechRecognition
    // gestiona sus propios permisos internamente — no necesitamos getUserMedia.
    const useSpeechEngine = (onPermissionError) => {
      const srRef       = useRef(null);
      const cbRef       = useRef(null);
      const timerRef    = useRef(null);
      const partialRef  = useRef('');
      const speakingRef = useRef(false);
      const mountedRef  = useRef(true);
      const readyRef    = useRef(false);
      const onReadyRef  = useRef(null);
      const [listening, setListening] = useState(false);

      const isAndroid = /android/i.test(navigator.userAgent);

      const makeSR = React.useCallback(() => {
        if (srRef.current) {
          try { srRef.current.abort(); } catch(e) {}
        }
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        const sr = new SR();
        sr.lang            = 'es-PE';
        sr.continuous      = false;
        sr.interimResults  = true;
        sr.maxAlternatives = 5;
        srRef.current = sr;

        sr.onstart = () => {
          readyRef.current = true;
          if (onReadyRef.current) {
            const cb = onReadyRef.current;
            onReadyRef.current = null;
            setTimeout(cb, 50);
          }
        };

        sr.onresult = (e) => {
          // Si la app está hablando o acaba de terminar (eco), descartar
          if (!mountedRef.current || speakingRef.current || !cbRef.current) {
            partialRef.current = ''; // limpiar buffer para no arrastrar eco
            return;
          }
          let fin = '', intr = '';
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const t = e.results[i][0].transcript;
            if (e.results[i].isFinal) fin += t; else intr += t;
          }
          if (fin) {
            partialRef.current = fin;
            cbRef.current('partial', fin);
          } else if (intr) {
            partialRef.current = intr;
            cbRef.current('interim', intr);
          }
        };

        sr.onerror = (e) => {
          if (!mountedRef.current) return;
          if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
            onPermissionError(
              'not-allowed'
            );
            return;
          }
          // no-speech, aborted, network: onend manejará el reinicio
        };

        sr.onend = () => {
          readyRef.current = false;
          if (!mountedRef.current) return;
          if (cbRef.current && !speakingRef.current) {
            makeSR();
            setTimeout(() => {
              if (mountedRef.current && srRef.current && cbRef.current) {
                try { srRef.current.start(); } catch(ex) {}
              }
            }, isAndroid ? 300 : 80);
          }
        };

        return sr;
      }, []);

      // init: solo crea SR, sin getUserMedia
      const init = React.useCallback(() => {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
          onPermissionError('no-sr');
          return;
        }
        mountedRef.current = true;
        makeSR();
      }, []);

      const destroy = React.useCallback(() => {
        mountedRef.current = false;
        speakingRef.current = false;
        clearTimeout(timerRef.current);
        cbRef.current = null;
        onReadyRef.current = null;
        readyRef.current = false;
        try { if (srRef.current) { srRef.current.onend = null; srRef.current.abort(); srRef.current = null; } } catch(e) {}
        setListening(false);
      }, []);

      const whenReady = React.useCallback((cb) => {
        if (readyRef.current) { setTimeout(cb, 50); return; }
        onReadyRef.current = cb;
      }, []);

      const expect = React.useCallback((onDone, ms = 10000) => {
        clearTimeout(timerRef.current);
        cbRef.current = null;
        partialRef.current = '';
        setListening(true);

        let settled = false;
        const settle = (text, tout) => {
          if (settled) return;
          settled = true;
          clearTimeout(timerRef.current);
          cbRef.current = null;
          setListening(false);
          onDone(text.trim(), tout);
        };

        cbRef.current = (type, text) => {
          if (type === 'partial') {
            clearTimeout(timerRef.current);
            timerRef.current = setTimeout(() => settle(text, false), 700);
          }
        };

        timerRef.current = setTimeout(() => {
          settle(partialRef.current || '', !partialRef.current);
        }, ms);

        if (!readyRef.current) {
          if (!srRef.current) makeSR();
          // Delay antes de arrancar el SR — en Android el eco del altavoz
          // puede durar hasta 1.5s; el speakingRef ya maneja eso pero
          // este delay extra evita que el SR arranque en pleno eco
          const isAndroid = /android/i.test(navigator.userAgent);
          setTimeout(() => {
            if (mountedRef.current && srRef.current && !readyRef.current) {
              try { srRef.current.start(); } catch(ex) {}
            }
          }, isAndroid ? 200 : 50);
        }
      }, []);

      return { speakingRef, partialRef, srRef, makeSR, init, destroy, expect, whenReady, listening };
    };
    // ════════════════════════════════════════════════════════════
    // VoiceInspectionModule
    // ════════════════════════════════════════════════════════════
    const VoiceInspectionModule = ({ employees, onInspectionComplete, onClose, autoStart = false }) => {
      const [vs, setVs]          = useState(VS.INIT);
      const [transcript, setTr]  = useState('');
      const [statusMsg, setStat] = useState('Iniciando micrófono...');
      const [subMsg, setSub]     = useState('');
      const [employee, setEmp]   = useState(null);
      const [inspData, setIData] = useState({});
      const [currentOI, setCOI]  = useState(null);
      const [permError, setPE]   = useState('');

      const { speakingRef, partialRef, srRef, makeSR, init, destroy, expect, whenReady, listening } =
        useSpeechEngine(errCode => {
          let msg = '';
          if (errCode === 'no-sr') {
            msg = 'Reconocimiento de voz no disponible. Usa Google Chrome en Android.';
          } else if (errCode === 'not-allowed') {
            msg = 'not-allowed';
          } else {
            msg = errCode;
          }
          setPE(msg);
          setStat('Micrófono bloqueado');
          setVs(VS.IDLE);
        });

      // speak con pausa del SR integrada
      const say = (text, onEnd) => speakAndListen(speakingRef, partialRef, text, onEnd, srRef, makeSR);

      const getVisible = (emp) =>
        INSPECTION_ITEMS.filter(i => !i.genderSpecific || emp.gender === i.genderSpecific);

      // Estado extra para campos de texto editables (obs/corr)
      const [obsText,  setObsText]  = useState('');
      const [corrText, setCorrText] = useState('');
      const [obsReady,  setObsReady]  = useState(false);
      const [corrReady, setCorrReady] = useState(false);
      // cola de ítems con falla
      const queueRef = useRef([]);
      const queueIdxRef = useRef(0);
      const collectedRef = useRef([]);
      const dataRef = useRef({});

      // Arrancar al montar — sin voz, arrancar directo en IDLE
      useEffect(() => {
        init();
        setStat('Di el número de empleado');
        setVs(VS.IDLE);
        return () => destroy();
      }, []);

      // ── PASO 1 ── Empleado ────────────────────────────────────
      const askEmployee = () => {
        setVs(VS.LISTENING); setTr('');
        setStat('🎙 Escuchando número de empleado...');
        setSub('Di solo el número: "3", "cinco", "empleado 2"');
        expect((text, tout) => {
          if (tout || !text) {
            setVs(VS.IDLE);
            setStat('No escuché. Toca el micrófono e intenta.');
            setSub(''); return;
          }
          setTr(text);
          const num = extractNum(text);
          const emp = num ? employees.find(e => e.id === num) : null;
          if (!emp) {
            setStat(`❌ No encontré el empleado "${text}"`);
            setSub('Toca el micrófono e intenta de nuevo');
            setVs(VS.IDLE); return;
          }
          setEmp(emp);
          setVs(VS.GENERAL);
          setStat(`👤 ${emp.name}`);
          setSub(emp.department + ' — ¿Todo conforme o con observaciones?');
          // Escuchar inmediatamente sin pausa
          say('', () => askGeneral(emp));
        }, 10000);
      };

      // ── PASO 2 ── ¿Listo o falla? ────────────────────────────
      const askGeneral = (emp) => {
        setVs(VS.GENERAL); setTr('');
        setStat(`👤 ${emp.name}`);
        setSub('🎙 Di:  ✅ "TODO CONFORME"   ó   ❌ "CON OBSERVACIONES"');
        expect((text, tout) => {
          if (tout || !text) {
            setSub('⏱ No escuché. Toca el micrófono.');
            setVs(VS.GENERAL);
            setTimeout(() => askGeneral(emp), 300); return;
          }
          setTr(text);
          const allOk = isAllOk(text);
          const obs   = hasObs(text);
          if (obs) {
            const base = buildConform(emp);
            dataRef.current = base;
            setIData(base);
            setVs(VS.ITEMS); setTr('');
            setStat('🎙 ¿Qué ítems tienen observación?');
            setSub('Di los nombres: "uniforme", "calzado y uñas", "manos"');
            say('', () => askItems(emp, base));
          } else if (allOk) {
            const d = buildConform(emp);
            setIData(d); setVs(VS.SAVING);
            setStat('✅ Todo conforme');
            setSub('Guardando...');
            say('', () => finish(emp, d));
          } else {
            setSub('No entendí. Di "TODO CONFORME" o "CON OBSERVACIONES"');
            setTimeout(() => askGeneral(emp), 400);
          }
        }, 10000);
      };

      // ── PASO 3 ── ¿Qué ítems? ────────────────────────────────
      const askItems = (emp, base) => {
        setVs(VS.ITEMS); setTr('');
        setStat('🎙 ¿Qué ítems tienen observación?');
        setSub('Ej: "uniforme", "calzado y uñas", "manos"');
        expect((text, tout) => {
          if (tout || !text) {
            setSub('No escuché. Toca el micrófono.');
            setTimeout(() => askItems(emp, base), 300); return;
          }
          setTr(text);
          const visible  = getVisible(emp);
          const detected = detectItems(text, visible);
          if (!detected.length) {
            setSub('No identifiqué ítems. Di: "uniforme", "calzado", "uñas"...');
            setTimeout(() => askItems(emp, base), 400); return;
          }
          const d = { ...base };
          detected.forEach(i => { d[i.id] = 'no-conforme'; });
          setIData(d);
          dataRef.current = d;
          queueRef.current = detected;
          queueIdxRef.current = 0;
          collectedRef.current = [];
          const names = detected.map(i => i.label).join(', ');
          setStat(`❌ Ítems con observación: ${detected.length}`);
          setSub(names);
          // Pequeña pausa para que el usuario vea los ítems detectados
          setTimeout(() => startObsCorr(emp, detected, 0, d, []), 800);
        }, 12000);
      };

      // ── PASO 4 ── Observación + Correctiva por ítem ───────────
      const startObsCorr = (emp, queue, idx, data, collected) => {
        if (idx >= queue.length) {
          const obsStr  = collected.map(c => c.obs).join('. ');
          const corrStr = collected.map(c => c.corr).join('. ');
          const final = { ...data, observations: obsStr, correctiveActions: corrStr };
          setIData(final); setVs(VS.SAVING);
          setStat('✅ Guardando inspección...');
          setSub('');
          say('', () => finish(emp, final));
          return;
        }
        const item = queue[idx];
        setCOI(item);
        setObsText(''); setCorrText('');
        setObsReady(false); setCorrReady(false);
        setVs(VS.OBS);
        setStat(`📝 Observación — ${item.label}`);
        setSub(`Ítem ${idx+1} de ${queue.length} · Habla o escribe`);
        setTr('');
        // Escuchar observación por voz
        expect((voiceObs, tout) => {
          if (!tout && voiceObs) {
            setObsText(voiceObs);
            setTr(voiceObs);
          }
          setObsReady(true);
        }, 8000);
      };

      // Confirmar observación y pedir correctiva
      const confirmObs = (emp, queue, idx, data, collected) => {
        const item = queue[idx];
        const obs = obsText.trim() || 'Sin detalle';
        setCorrText(''); setCorrReady(false);
        setVs(VS.CORR);
        setStat(`🔧 Medida correctiva — ${item.label}`);
        setSub(`Habla o escribe la acción correctiva`);
        setTr('');
        expect((voiceCorr, tout) => {
          if (!tout && voiceCorr) {
            setCorrText(voiceCorr);
            setTr(voiceCorr);
          }
          setCorrReady(true);
        }, 8000);
        // Guardar obs para usar en confirmCorr
        queueRef.current = queue;
        queueIdxRef.current = idx;
        collectedRef.current = [...collected, { obs }];
        dataRef.current = data;
      };

      const confirmCorr = (emp) => {
        const corr = corrText.trim() || 'Pendiente';
        const collected = [...collectedRef.current];
        const last = collected[collected.length - 1];
        last.corr = corr;
        const queue = queueRef.current;
        const idx   = queueIdxRef.current;
        const data  = dataRef.current;
        startObsCorr(emp, queue, idx + 1, data, collected);
      };

      // ── Guardar ───────────────────────────────────────────────
      const finish = (emp, data) => {
        const ok = INSPECTION_ITEMS.every(item => {
          if (data[item.id] === 'no-conforme') return false;
          const vis = !item.genderSpecific || emp.gender === item.genderSpecific;
          if (item.required && vis && !data[item.id]) return false;
          return true;
        });
        onInspectionComplete({
          employeeId: emp.id,
          date: new Date().toISOString().split('T')[0],
          status: ok ? 'compliant' : 'non-compliant',
          healthStatus: data.healthStatus || 'conforme',
          wounds:       data.wounds       || 'conforme',
          uniform:      data.uniform      || 'conforme',
          footwear:     data.footwear     || 'conforme',
          nails:        data.nails        || 'conforme',
          hair:         data.hair         || 'conforme',
          shaved:       data.shaved       || (emp.gender==='male'?'conforme':'no-aplica'),
          noObjects:    data.noObjects    || 'conforme',
          noMakeup:     data.noMakeup     || (emp.gender==='female'?'conforme':'no-aplica'),
          handWash:     data.handWash     || 'conforme',
          observations:      data.observations      || '',
          correctiveActions: data.correctiveActions || '',
        });
        setVs(VS.DONE);
        setStat(ok ? '✅ Inspección conforme guardada' : '⚠️ Con observaciones — guardada');
        setSub(emp.name);
        // Auto-avanzar al siguiente empleado tras 1.5s
        setTimeout(() => {
          setVs(VS.IDLE); setEmp(null); setIData({}); setTr('');
          setCOI(null); setObsText(''); setCorrText('');
          setStat('Di el número del siguiente empleado');
          setSub('');
          askEmployee();
        }, 1500);
      };

      const buildConform = (emp) => {
        const d = {};
        INSPECTION_ITEMS.forEach(i => {
          d[i.id] = (!i.genderSpecific || emp.gender===i.genderSpecific) ? 'conforme' : 'no-aplica';
        });
        d.observations = ''; d.correctiveActions = '';
        return d;
      };

      const closeAll = () => { destroy(); onClose(); };

      // ── UI ────────────────────────────────────────────────────
      const SC = {
        [VS.INIT]:     'bg-gray-100 text-gray-500',
        [VS.IDLE]:     'bg-gray-100 text-gray-700',
        [VS.LISTENING]:'bg-blue-50 text-blue-800',
        [VS.CONFIRM]:  'bg-indigo-50 text-indigo-800',
        [VS.GENERAL]:  'bg-yellow-50 text-yellow-900',
        [VS.ITEMS]:    'bg-orange-50 text-orange-900',
        [VS.OBS]:      'bg-red-50 text-red-800',
        [VS.CORR]:     'bg-purple-50 text-purple-800',
        [VS.SAVING]:   'bg-green-50 text-green-800',
        [VS.DONE]:     'bg-green-50 text-green-800',
      }[vs] || 'bg-gray-100 text-gray-700';

      const visibleItems = employee ? getVisible(employee) : [];
      const itemResults  = visibleItems.filter(i => inspData[i.id]);

      return (
        <div className="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-2">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[96vh]">

            {/* Header */}
            <div className="bg-[#2c6e49] px-5 py-3 flex items-center justify-between flex-shrink-0">
              <div className="flex items-center gap-2">
                <MicrophoneIcon className="w-5 h-5 text-white" />
                <h2 className="text-white font-semibold text-base">Inspección por Voz — v6</h2>
              </div>
              <button onClick={closeAll} className="text-white/70 hover:text-white text-2xl leading-none">&times;</button>
            </div>

            {/* Contenido scrolleable */}
            <div className="overflow-y-auto flex-1 px-4 py-3 space-y-3">

              {/* Error de micrófono */}
              {permError && (
                <div className="bg-red-50 border border-red-300 rounded-xl px-4 py-4 space-y-3">
                  <p className="font-bold text-red-900 text-sm">🎙️ Micrófono bloqueado</p>
                  <div className="text-xs text-red-800 space-y-1">
                    <p>① Ajustes Android → Apps → Chrome → Permisos → Micrófono → <strong>Permitir</strong></p>
                    <p>② En Chrome toca ⓘ junto a la URL → Permisos → Micrófono → <strong>Permitir</strong></p>
                    <p>③ Si abriste desde WhatsApp → 3 puntos → <strong>"Abrir en Chrome"</strong></p>
                  </div>
                  <button onClick={() => { setPE(''); setStat('Di el número de empleado'); setVs(VS.IDLE); init(); }}
                    className="w-full bg-red-600 text-white text-sm font-semibold py-2.5 rounded-xl active:scale-95">
                    🔄 Reintentar
                  </button>
                </div>
              )}

              {/* Tarjeta de estado principal */}
              <div className={`rounded-xl px-4 py-3 ${SC} transition-colors duration-200`}>
                <p className="font-bold text-base leading-snug">{statusMsg}</p>
                {subMsg && <p className="text-sm mt-1 opacity-80 leading-snug">{subMsg}</p>}
              </div>

              {/* Lo que escuchó el SR */}
              {transcript ? (
                <div className="bg-gray-50 rounded-lg px-3 py-2 border border-gray-200">
                  <p className="text-xs text-gray-400 mb-0.5">Escuché:</p>
                  <p className="text-gray-700 text-sm italic">"{transcript}"</p>
                </div>
              ) : null}

              {/* Campo de texto para observación */}
              {vs === VS.OBS && (
                <div className="space-y-2">
                  <textarea
                    value={obsText}
                    onChange={e => setObsText(e.target.value)}
                    placeholder="Escribe o dicta la observación..."
                    rows={3}
                    className="w-full border border-red-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 resize-none"
                  />
                  <button
                    onClick={() => confirmObs(employee, queueRef.current, queueIdxRef.current, dataRef.current, collectedRef.current)}
                    disabled={!obsText.trim() && !obsReady}
                    className="w-full bg-red-600 hover:bg-red-700 disabled:opacity-40 text-white font-semibold py-2.5 rounded-xl text-sm active:scale-95 transition-all">
                    ✓ Confirmar observación
                  </button>
                  {!obsReady && listening && (
                    <p className="text-xs text-center text-red-500 animate-pulse">🎙 Escuchando... también puedes escribir arriba</p>
                  )}
                  {obsReady && !obsText.trim() && (
                    <p className="text-xs text-center text-gray-400">No se escuchó nada — escribe la observación y confirma</p>
                  )}
                </div>
              )}

              {/* Campo de texto para medida correctiva */}
              {vs === VS.CORR && (
                <div className="space-y-2">
                  <textarea
                    value={corrText}
                    onChange={e => setCorrText(e.target.value)}
                    placeholder="Escribe o dicta la medida correctiva..."
                    rows={3}
                    className="w-full border border-purple-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400 resize-none"
                  />
                  <button
                    onClick={() => confirmCorr(employee)}
                    disabled={!corrText.trim() && !corrReady}
                    className="w-full bg-purple-600 hover:bg-purple-700 disabled:opacity-40 text-white font-semibold py-2.5 rounded-xl text-sm active:scale-95 transition-all">
                    ✓ Confirmar medida correctiva
                  </button>
                  {!corrReady && listening && (
                    <p className="text-xs text-center text-purple-500 animate-pulse">🎙 Escuchando... también puedes escribir arriba</p>
                  )}
                  {corrReady && !corrText.trim() && (
                    <p className="text-xs text-center text-gray-400">No se escuchó nada — escribe la medida y confirma</p>
                  )}
                </div>
              )}

              {/* Ítem actual en OBS/CORR */}
              {currentOI && [VS.OBS, VS.CORR].includes(vs) && (
                <div className="bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
                  <p className="text-xs text-amber-600 font-medium">
                    {vs===VS.OBS ? '📋 Observación en:' : '🔧 Medida correctiva en:'}
                  </p>
                  <p className="text-amber-900 font-bold text-sm">{currentOI.label}</p>
                </div>
              )}

              {/* Chips de ítems */}
              {itemResults.length > 0 && (
                <div className="flex flex-wrap gap-1.5">
                  {itemResults.map(item => {
                    const v = inspData[item.id];
                    const col = v==='conforme'?'bg-green-100 text-green-700':v==='no-conforme'?'bg-red-100 text-red-700':'bg-gray-100 text-gray-500';
                    const sym = v==='conforme'?'✓':v==='no-conforme'?'✗':'—';
                    return (
                      <span key={item.id} className={`text-xs px-2 py-1 rounded-full font-medium ${col}`}>
                        {sym} {item.label.length>14?item.label.substring(0,13)+'…':item.label}
                      </span>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Botones inferiores */}
            <div className="px-4 pb-4 pt-2 flex flex-col items-center gap-2 flex-shrink-0 border-t border-gray-100">
              {/* Botón principal micrófono — solo en IDLE y GENERAL */}
              {(vs === VS.IDLE || vs === VS.GENERAL) && !permError && (
                <button
                  onClick={vs === VS.IDLE ? askEmployee : () => askGeneral(employee)}
                  className="w-18 h-18 w-20 h-20 rounded-full bg-[#2c6e49] hover:bg-[#4c956c] flex items-center justify-center shadow-lg transition-all active:scale-95 hover:scale-105">
                  <MicrophoneIcon className="w-10 h-10 text-white" />
                </button>
              )}
              {/* Animación grabando */}
              {listening && ![VS.OBS, VS.CORR].includes(vs) && (
                <div className="relative flex items-center justify-center w-20 h-20">
                  <div className="absolute w-20 h-20 rounded-full bg-red-400 opacity-20 animate-ping"></div>
                  <div className="absolute w-16 h-16 rounded-full bg-red-400 opacity-30 animate-ping" style={{animationDelay:'0.2s'}}></div>
                  <div className="relative w-16 h-16 rounded-full bg-red-500 flex flex-col items-center justify-center shadow-xl z-10">
                    <MicrophoneIcon className="w-8 h-8 text-white" />
                    <span className="text-white text-xs font-bold">GRABANDO</span>
                  </div>
                </div>
              )}
              {/* Procesando */}
              {!listening && ![VS.IDLE,VS.GENERAL,VS.DONE,VS.INIT,VS.OBS,VS.CORR].includes(vs) && (
                <div className="flex items-center gap-2 text-gray-400 py-2">
                  <div className="w-2 h-2 rounded-full bg-gray-300 animate-pulse"></div>
                  <div className="w-2 h-2 rounded-full bg-gray-300 animate-pulse" style={{animationDelay:'0.2s'}}></div>
                  <div className="w-2 h-2 rounded-full bg-gray-300 animate-pulse" style={{animationDelay:'0.4s'}}></div>
                  <p className="text-sm ml-1">Procesando...</p>
                </div>
              )}
              {/* Botón Finalizar siempre visible */}
              <button onClick={closeAll}
                className="w-full flex items-center justify-center gap-2 bg-gray-100 text-gray-600 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-200 transition-colors active:scale-95">
                <CheckBadgeIcon className="w-4 h-4" />
                Finalizar inspecciones
              </button>
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      const initialFormatInfo = {
        code: 'PO-BPM-F-06',
        validity: 'mayo 2025',
        preparedBy: 'Asesor externo',
        reviewedBy: 'Jefe de Planta',
        approvedBy: 'Gerente General',
      };

      const [activeTab, setActiveTab] = React.useState('dashboard');

      // User authentication state
      const [currentUser, setCurrentUser] = React.useState(() => {
        try {
          const savedUser = localStorage.getItem('hygieneAppCurrentUser');
          return savedUser ? JSON.parse(savedUser) : null;
        } catch (error) {
          console.error("Could not load user from localStorage", error);
          return null;
        }
      });

      const [formatInfo, setFormatInfo] = React.useState(() => {
        try {
          const saved = localStorage.getItem('hygieneAppFormatInfo');
          return saved ? JSON.parse(saved) : initialFormatInfo;
        } catch (error) {
          console.error("Could not load format info from localStorage", error);
          return initialFormatInfo;
        }
      });

      const [employees, setEmployees] = React.useState(() => {
        try {
          const savedEmployees = localStorage.getItem('hygieneAppEmployees');
          if (savedEmployees) {
            const parsed = JSON.parse(savedEmployees);
            // Si el usuario tiene la lista inicial antigua de exactamente 5 empleados, actualizar a los 50
            if (parsed.length === 5 && parsed.every((emp, idx) => emp.name === initialEmployees[idx]?.name)) {
              return initialEmployees;
            }
            return parsed;
          }
          return initialEmployees;
        } catch (error) {
          console.error("Could not load employees from localStorage", error);
          return initialEmployees;
        }
      });

      const [inspections, setInspections] = React.useState(() => {
        try {
          const savedInspections = localStorage.getItem('hygieneAppInspections');
          return savedInspections ? JSON.parse(savedInspections) : initialInspections;
        } catch (error) {
          console.error("Could not load inspections from localStorage", error);
          return initialInspections;
        }
      });

      const [isInspectionModalOpen, setInspectionModalOpen] = React.useState(false);
      const [isMethodSelectionModalOpen, setMethodSelectionModalOpen] = React.useState(false);
      const [isVoiceModuleOpen, setVoiceModuleOpen] = React.useState(false);
      const [voiceAutoStart, setVoiceAutoStart]     = React.useState(false);
      const [isEmployeeModalOpen, setEmployeeModalOpen] = React.useState(false);
      const [editingInspection, setEditingInspection] = React.useState(null);
      const [editingEmployee, setEditingEmployee] = React.useState(null);

      const [notification, setNotification] = React.useState({
        show: false,
        type: 'success',
        title: '',
        message: '',
      });

      // Save current user to localStorage
      React.useEffect(() => {
        try {
          if (currentUser) {
            localStorage.setItem('hygieneAppCurrentUser', JSON.stringify(currentUser));
          } else {
            localStorage.removeItem('hygieneAppCurrentUser');
          }
        } catch (error) {
          console.error("Could not save user to localStorage", error);
        }
      }, [currentUser]);

      React.useEffect(() => {
        try {
          localStorage.setItem('hygieneAppFormatInfo', JSON.stringify(formatInfo));
        } catch (error) {
          console.error("Could not save format info to localStorage", error);
        }
      }, [formatInfo]);

      React.useEffect(() => {
        const empJson = JSON.stringify(employees);
        // Limpiar claves grandes antes de guardar employees
        const tryClean = () => {
          try { localStorage.removeItem('hygieneAppInspections'); } catch(e) {}
        };
        try {
          localStorage.setItem('hygieneAppEmployees', empJson);
        } catch(e) {
          tryClean();
          try { localStorage.setItem('hygieneAppEmployees', empJson); } catch(e2) {}
        }
      }, [employees]);

      React.useEffect(() => {
        try {
          localStorage.setItem('hygieneAppInspections', JSON.stringify(inspections));
        } catch (error) {
          // Storage lleno: guardar solo las 200 más recientes
          try {
            const trimmed = inspections.slice(0, 200);
            localStorage.setItem('hygieneAppInspections', JSON.stringify(trimmed));
          } catch(e2) {
            console.warn('No se pudo guardar inspections en localStorage');
          }
        }
      }, [inspections]);

      const stats = React.useMemo(() => {
        const totalInspections = inspections.length;
        const compliantInspections = inspections.filter(i => i.status === 'compliant').length;
        const nonCompliantInspections = totalInspections - compliantInspections;
        const complianceRate = totalInspections > 0 ? Math.round((compliantInspections / totalInspections) * 100) : 0;
        return { totalInspections, compliantInspections, nonCompliantInspections, complianceRate };
      }, [inspections]);

      const showNotification = React.useCallback((type, title, message) => {
        setNotification({ show: true, type, title, message });
      }, []);

      React.useEffect(() => {
        if (notification.show) {
          const timer = setTimeout(() => setNotification(prev => ({ ...prev, show: false })), 5000);
          return () => clearTimeout(timer);
        }
      }, [notification.show]);

      const saveFormatInfoChanges = React.useCallback((newFormatInfo) => {
        setFormatInfo(newFormatInfo);
        showNotification('success', 'Cambios Guardados', 'La información del formato ha sido actualizada.');
      }, [showNotification]);

      const addInspection = React.useCallback((inspectionData) => {
        const employee = employees.find(e => e.id === inspectionData.employeeId);
        if (!employee) return;

        const isCompliant = INSPECTION_ITEMS.every(item => {
          const result = inspectionData[item.id];
          if (result === 'no-conforme') return false;
          if (item.required && result === null) return false;
          return true;
        });

        if (inspectionData.id) {
          // Editing existing inspection
          const updatedInspection = {
            ...inspectionData,
            status: isCompliant ? 'compliant' : 'non-compliant',
          };
          setInspections(prev => prev.map(i => i.id === inspectionData.id ? updatedInspection : i));
          setInspectionModalOpen(false);
          setEditingInspection(null);
          showNotification('success', 'Inspección actualizada', 'Los cambios han sido guardados correctamente');
        } else {
          // Adding new inspection
          const newInspection = {
            ...inspectionData,
            id: inspections.length > 0 ? inspections.reduce((mx,i) => i.id>mx?i.id:mx, 0) + 1 : 1,
            status: isCompliant ? 'compliant' : 'non-compliant',
          };
          setInspections(prev => [newInspection, ...prev]);
          setInspectionModalOpen(false);

          if (isCompliant) {
            showNotification('success', 'Inspección registrada', 'La inspección se ha registrado correctamente');
          } else {
            showNotification('warning', 'Inspección con no conformidades', 'Se han detectado no conformidades');
          }
        }
      }, [inspections, employees, showNotification]);


      // Handler para inspección por voz
      const handleVoiceInspection = React.useCallback((inspectionData) => {
        const employee = employees.find(e => e.id === inspectionData.employeeId);
        if (!employee) return;
        const newInspection = {
          ...inspectionData,
          id: inspections.length > 0 ? inspections.reduce((mx,i) => i.id>mx?i.id:mx, 0) + 1 : 1,
        };
        setInspections(prev => [newInspection, ...prev]);
        if (inspectionData.status === 'compliant') {
          showNotification('success', 'Inspección por voz', `${employee.name} — Todo conforme ✓`);
        } else {
          showNotification('warning', 'Inspección por voz', `${employee.name} — Con observaciones`);
        }
      }, [employees, inspections, showNotification]);

      const deleteInspection = React.useCallback((id) => {
        if (window.confirm('¿Está seguro de que desea eliminar esta inspección?')) {
          setInspections(prev => prev.filter(i => i.id !== id));
          showNotification('success', 'Inspección eliminada', 'La inspección ha sido eliminada.');
        }
      }, [showNotification]);

      const editInspection = React.useCallback((inspection) => {
        setEditingInspection(inspection);
        setInspectionModalOpen(true);
      }, []);

      const handleNewInspection = React.useCallback(() => {
        if (IS_ANDROID) {
          setMethodSelectionModalOpen(true);
        } else {
          setInspectionModalOpen(true);
        }
      }, []);

      const addEmployee = React.useCallback((employeeData) => {
        if (employeeData.id) {
          // Editing existing employee
          setEmployees(prev => prev.map(e => e.id === employeeData.id ? employeeData : e));
          setEmployeeModalOpen(false);
          setEditingEmployee(null);
          showNotification('success', 'Empleado actualizado', 'Los cambios han sido guardados correctamente.');
        } else {
          // Adding new employee
          if (employees.length >= 50) {
            showNotification('warning', 'Límite alcanzado', 'No se pueden agregar más de 50 empleados.');
            setEmployeeModalOpen(false);
            return;
          }
          const newEmployee = {
            ...employeeData,
            id: employees.length > 0 ? employees.reduce((mx,e) => e.id>mx?e.id:mx, 0) + 1 : 1,
          };
          setEmployees(prev => [newEmployee, ...prev]);
          setEmployeeModalOpen(false);
          showNotification('success', 'Empleado agregado', 'El nuevo empleado se ha registrado correctamente.');
        }
      }, [employees, showNotification]);

      const deleteEmployee = React.useCallback((id) => {
        if (window.confirm('¿Está seguro de que desea eliminar este empleado?')) {
          setEmployees(prev => prev.filter(e => e.id !== id));
          showNotification('success', 'Empleado eliminado', 'El empleado ha sido eliminado.');
        }
      }, [showNotification]);

      const editEmployee = React.useCallback((employee) => {
        setEditingEmployee(employee);
        setEmployeeModalOpen(true);
      }, []);

      const handleExportJSON = React.useCallback(() => {
        const blob = new Blob([JSON.stringify({ employees }, null, 2)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url; a.download = 'empleados_orfel.json'; a.click();
        URL.revokeObjectURL(url);
        showNotification('success', 'Exportado', employees.length + ' empleados exportados.');
      }, [employees, showNotification]);

      const handleImportJSON = React.useCallback((e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            const emps = Array.isArray(data) ? data : (data.employees || []);
            if (!emps.length) { showNotification('warning', 'Vacío', 'Sin empleados en el JSON.'); return; }
            setEmployees(emps);
            showNotification('success', 'Importado', emps.length + ' empleados cargados.');
          } catch(err) { showNotification('warning', 'Error', 'No se pudo leer el JSON.'); }
        };
        reader.readAsText(file); e.target.value = '';
      }, [showNotification]);

      const handleResetData = React.useCallback(() => {
        if (window.confirm('¿Está seguro de que desea restablecer TODOS los datos? Se perderán empleados, inspecciones y la información del formato.')) {
          setEmployees(initialEmployees);
          setInspections(initialInspections);
          setFormatInfo(initialFormatInfo);
          showNotification('success', 'Datos restablecidos', 'Todos los datos han sido restaurados.');
        }
      }, [showNotification]);

      const handleSimulateInspections = React.useCallback(() => {
        if (employees.length === 0) {
          showNotification('warning', 'No hay empleados', 'Debe agregar empleados antes de simular inspecciones.');
          return;
        }

        const today = new Date().toISOString().split('T')[0];

        // Check if there are already inspections for today
        const existingInspectionsToday = inspections.filter(i => i.date === today);
        if (existingInspectionsToday.length > 0) {
          if (!window.confirm(`Ya existen ${existingInspectionsToday.length} inspección(es) para hoy. ¿Desea agregar inspecciones conformes para los empleados restantes?`)) {
            return;
          }
        }

        // Get employees that don't have inspections for today
        const employeesWithInspectionsToday = new Set(existingInspectionsToday.map(i => i.employeeId));
        const employeesToInspect = employees.filter(e => !employeesWithInspectionsToday.has(e.id));

        if (employeesToInspect.length === 0) {
          showNotification('warning', 'Inspecciones completas', 'Todos los empleados ya tienen inspección para hoy.');
          return;
        }

        // Generate compliant inspections for all employees
        const newInspections = employeesToInspect.map((employee, index) => {
          const baseId = inspections.length > 0 ? inspections.reduce((mx,i) => i.id>mx?i.id:mx, 0) + 1 : 1;
          return {
            id: baseId + index,
            employeeId: employee.id,
            date: today,
            status: 'compliant',
            healthStatus: 'conforme',
            wounds: 'conforme',
            uniform: 'conforme',
            footwear: 'conforme',
            nails: 'conforme',
            hair: 'conforme',
            shaved: employee.gender === 'male' ? 'conforme' : 'no-aplica',
            noObjects: 'conforme',
            noMakeup: employee.gender === 'female' ? 'conforme' : 'no-aplica',
            handWash: 'conforme',
            observations: '',
            correctiveActions: ''
          };
        });

        setInspections(prev => [...newInspections, ...prev]);
        showNotification('success', 'Simulación completada', `Se han generado ${newInspections.length} inspección(es) conforme(s) para hoy.`);
      }, [employees, inspections, showNotification]);

      // Delete all inspections handler
      const handleDeleteAllInspections = React.useCallback(() => {
        if (inspections.length === 0) {
          showNotification('warning', 'No hay inspecciones', 'No hay inspecciones para eliminar.');
          return;
        }

        if (window.confirm(`¿Está seguro de que desea eliminar TODAS las ${inspections.length} inspecciones? Esta acción no se puede deshacer.`)) {
          setInspections([]);
          showNotification('success', 'Inspecciones eliminadas', 'Todas las inspecciones han sido eliminadas correctamente.');
        }
      }, [inspections, showNotification]);

      // Login handler
      const handleLogin = React.useCallback((user) => {
        setCurrentUser(user);
        showNotification('success', 'Bienvenido', `Has iniciado sesión como ${user.name}`);
      }, [showNotification]);

      // Logout handler
      const handleLogout = React.useCallback(() => {
        if (window.confirm('¿Está seguro de que desea cerrar sesión?')) {
          setCurrentUser(null);
          setActiveTab('dashboard');
          showNotification('success', 'Sesión cerrada', 'Has cerrado sesión correctamente');
        }
      }, [showNotification]);

      // Check if user has permission to edit
      const canEdit = currentUser?.role === 'admin';

      const renderContent = () => {
        switch (activeTab) {
          case 'dashboard':
            return <Dashboard stats={stats} inspections={inspections} employees={employees} onNewInspection={handleNewInspection} formatInfo={formatInfo} onSaveChanges={saveFormatInfoChanges} canEdit={canEdit} />;
          case 'inspections':
            return <InspectionsList inspections={inspections} employees={employees} onDelete={deleteInspection} onEdit={editInspection} onNewInspection={handleNewInspection} canEdit={canEdit} onDeleteAll={handleDeleteAllInspections} />;
          case 'reports':
            return <Reports inspections={inspections} employees={employees} formatInfo={formatInfo} />;
          case 'admin':
            return <Admin employees={employees} onAddEmployee={() => { setEditingEmployee(null); setEmployeeModalOpen(true); }} onEditEmployee={editEmployee} onDeleteEmployee={deleteEmployee} onResetData={handleResetData} onSimulateInspections={handleSimulateInspections} onImportExcel={(e) => handleFileUpload(e, setEmployees, showNotification)} onExportJSON={handleExportJSON} onImportJSON={handleImportJSON} />;
          default:
            return null;
        }
      };

      // If not logged in, show login screen
      if (!currentUser) {
        return <LoginScreen onLogin={handleLogin} />;
      }

      return (
        <div className="min-h-screen bg-[#f5f7fa] text-[#212529] font-sans">
          <Header currentUser={currentUser} onLogout={handleLogout} />
          <main className="max-w-7xl mx-auto p-5">
            <Tabs activeTab={activeTab} setActiveTab={setActiveTab} />
            {renderContent()}
          </main>
          {/* Botón flotante de voz — solo en Android */}
          {canEdit && IS_ANDROID && (
            <button
              onClick={() => { setVoiceAutoStart(false); setVoiceModuleOpen(true); }}
              title="Inspección por voz"
              className="fixed bottom-6 right-6 z-40 w-16 h-16 rounded-full bg-[#2c6e49] hover:bg-[#4c956c] shadow-2xl flex items-center justify-center transition-all active:scale-95 hover:scale-105"
            >
              <MicrophoneIcon className="w-8 h-8 text-white" />
            </button>
          )}
          {isVoiceModuleOpen && IS_ANDROID && (
            <VoiceInspectionModule
              employees={employees}
              onInspectionComplete={handleVoiceInspection}
              autoStart={voiceAutoStart}
              onClose={() => { setVoiceModuleOpen(false); setVoiceAutoStart(false); }}
            />
          )}
          {isMethodSelectionModalOpen && (
            <Modal
              isOpen={isMethodSelectionModalOpen}
              onClose={() => setMethodSelectionModalOpen(false)}
              title="Seleccione Método de Inspección"
              footer={
                <button
                  onClick={() => setMethodSelectionModalOpen(false)}
                  className="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium hover:bg-gray-50 transition-colors w-full sm:w-auto"
                >
                  Cancelar
                </button>
              }
            >
              <div className="flex flex-col sm:flex-row gap-4 p-2 justify-center">
                <button
                  onClick={() => {
                    setMethodSelectionModalOpen(false);
                    setVoiceAutoStart(true);
                    setVoiceModuleOpen(true);
                  }}
                  className="flex-1 flex flex-col items-center justify-center p-6 border-2 border-[#2c6e49] hover:bg-green-50 rounded-xl transition-all hover:scale-[1.02] active:scale-[0.98]"
                >
                  <MicrophoneIcon className="w-12 h-12 text-[#2c6e49] mb-3 animate-pulse" />
                  <span className="font-semibold text-gray-800 text-lg">Por Voz</span>
                  <span className="text-sm text-gray-500 mt-1 text-center">Guiado por comandos de voz</span>
                </button>
                <button
                  onClick={() => {
                    setMethodSelectionModalOpen(false);
                    setInspectionModalOpen(true);
                  }}
                  className="flex-1 flex flex-col items-center justify-center p-6 border-2 border-gray-200 hover:border-[#2c6e49] hover:bg-green-50 rounded-xl transition-all hover:scale-[1.02] active:scale-[0.98]"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-12 h-12 text-gray-600 mb-3">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
                  </svg>
                  <span className="font-semibold text-gray-800 text-lg">Manual</span>
                  <span className="text-sm text-gray-500 mt-1 text-center">Formulario interactivo clásico</span>
                </button>
              </div>
            </Modal>
          )}
          <InspectionModal
            isOpen={isInspectionModalOpen}
            onClose={() => { setInspectionModalOpen(false); setEditingInspection(null); }}
            onSubmit={addInspection}
            employees={employees}
            editingInspection={editingInspection}
          />
          <EmployeeModal
            isOpen={isEmployeeModalOpen}
            onClose={() => { setEmployeeModalOpen(false); setEditingEmployee(null); }}
            onSubmit={addEmployee}
            editingEmployee={editingEmployee}
          />
          <Notification
            show={notification.show}
            type={notification.type}
            title={notification.title}
            message={notification.message}
          />
        </div>
      );
    }
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(
      <React.StrictMode>
        <App />
      </React.StrictMode>
    );

  </script>
</body>

</html>
